<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Screen 3 – Queue Eliminator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.cells.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
<style>
/* ─── RESET / BASE ─────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; overflow: hidden;
  background: #f7f5f0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ─── SCREEN 3 WRAPPER ─────────────────────────────────────── */
#screen3 {
  position: fixed; inset: 0; z-index: 6;
  display: flex; align-items: center; justify-content: center;
  padding: 2.5rem 2rem;
  background: #edeae3;
  opacity: 1; visibility: visible; pointer-events: auto;
}

/* ─── VANTA BACKGROUND ─────────────────────────────────────── */
#vanta-bg {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
}
#vanta-bg::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(237, 234, 227, 0.72); pointer-events: none;
}

/* ─── APP WINDOW ───────────────────────────────────────────── */
.app-win {
  width: 100%; max-width: 1100px;
  height: calc(100vh - 5rem); max-height: 700px;
  background: #fff; border-radius: 16px;
  box-shadow:
    0 40px 100px rgba(0,0,0,.18),
    0 10px 30px rgba(0,0,0,.10),
    0 0 0 1px rgba(0,0,0,.05);
  display: flex; flex-direction: column; overflow: hidden;
  transform: scale(.95);
  transition: transform .65s cubic-bezier(.22,1,.36,1);
}
.app-win.rdy {
  transform: scale(1);
  animation: winEntrance .55s cubic-bezier(.22,1,.36,1) forwards;
}
.app-win:hover {
  box-shadow:
    0 50px 120px rgba(0,0,0,.22),
    0 14px 36px rgba(0,0,0,.12),
    0 0 0 1px rgba(0,0,0,.05);
  transition: box-shadow .4s ease;
}
@keyframes winEntrance {
  from { opacity: 0; transform: scale(.96) translateY(14px); }
  to   { opacity: 1; transform: scale(1)   translateY(0);    }
}

/* ─── TITLE BAR ────────────────────────────────────────────── */
.win-bar {
  flex-shrink: 0; height: 46px;
  background: #f0ede8; border-bottom: 1px solid rgba(0,0,0,.07);
  display: flex; align-items: center;
  padding: 0 16px; gap: 8px; user-select: none;
}
.wb {
  width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
  cursor: default;
  transition: filter .2s, transform .15s;
}
.wb:hover { filter: brightness(.80); transform: scale(1.18); }
.wb.r { background: #ff5f57; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.15); }
.wb.y { background: #febc2e; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.12); }
.wb.g { background: #28c840; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.12); }
.wb.r:hover { filter: brightness(.9) drop-shadow(0 0 4px rgba(255,95,87,.5));  }
.wb.y:hover { filter: brightness(.9) drop-shadow(0 0 4px rgba(254,188,46,.5)); }
.wb.g:hover { filter: brightness(.9) drop-shadow(0 0 4px rgba(40,200,64,.5));  }

/* ─── TAB BAR ──────────────────────────────────────────────── */
.win-tabs {
  flex-shrink: 0; height: 38px;
  background: #f8f6f2; border-bottom: 1px solid rgba(0,0,0,.06);
  display: flex; align-items: center;
  padding: 0 16px; gap: 6px;
}
.win-tab {
  height: 26px; padding: 0 14px; border-radius: 7px;
  font-size: .73rem; font-weight: 500; color: #666;
  display: flex; align-items: center;
  cursor: default;
  position: relative;
  transition: background .15s, color .2s, transform .15s;
}
.win-tab.on  { background: rgba(0,0,0,.07); color: #1a1a1a; }
.win-tab:hover:not(.on) { background: rgba(0,0,0,.04); transform: translateY(-1px); }
.win-tab.on::after {
  content: ''; position: absolute; bottom: -1px;
  left: 50%; transform: translateX(-50%);
  width: 60%; height: 2px; border-radius: 2px; background: #44E87A;
  animation: tabIndicatorIn .25s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes tabIndicatorIn {
  from { width: 0%;   opacity: 0; }
  to   { width: 60%;  opacity: 1; }
}

/* ─── WIN BODY ─────────────────────────────────────────────── */
.win-body {
  flex: 1; background: #faf9f6;
  position: relative; overflow: hidden;
  display: flex; flex-direction: row; align-items: stretch;
}
.win-body-inner {
  display: flex; flex-direction: row;
  width: 100%; height: 100%;
  position: relative; z-index: 1;
}
.win-body-left  { flex: 1; min-width: 0; height: 100%; overflow: hidden; position: relative; }
.win-body-right {
  flex-shrink: 0; width: 440px;
  display: flex; align-items: center; justify-content: center;
  padding: 8px 24px;
  background: transparent; position: relative; z-index: 2;
}

/* ─── TAB PANELS ───────────────────────────────────────────── */
.tab-panel {
  position: absolute; inset: 0;
  opacity: 0; pointer-events: none;
  transition: opacity .32s ease; overflow: hidden;
}
.tab-panel.active { opacity: 1; pointer-events: auto; }
.win-body-left .tab-panel { position: absolute; inset: 0; }

/* ─── HOW-TO PANEL (Admin) ─────────────────────────────────── */
.how-to-wrap {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 2rem 2.8rem 1.6rem;
  box-sizing: border-box; justify-content: center;
}
.how-to-eyebrow {
  font-size: .65rem; font-weight: 600;
  letter-spacing: .2em; text-transform: uppercase; color: #44E87A;
  margin-bottom: .7rem;
  opacity: 0; transform: translateY(8px);
  transition: opacity .45s ease-out, transform .45s ease-out;
}
.how-to-eyebrow.vis { opacity: 1; transform: translateY(0); }
.how-to-heading {
  font-size: clamp(1.55rem, 2.8vw, 2.2rem); font-weight: 700;
  letter-spacing: -.025em; color: #111; line-height: 1.15;
  margin-bottom: 1.6rem;
  opacity: 0; transform: translateY(12px);
  transition: opacity .55s ease-out, transform .55s ease-out;
}
.how-to-heading.vis { opacity: 1; transform: translateY(0); }
.how-to-grid { display: grid; grid-template-columns: 1fr; gap: 1.4rem; flex: 1; max-width: 480px; }
.htg-col { display: flex; flex-direction: column; gap: .3rem; }
.htg-col-label {
  font-size: .62rem; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase; color: #aaa;
  margin-bottom: .55rem; padding-bottom: .45rem;
  border-bottom: 1px solid rgba(0,0,0,.07);
  opacity: 0; transform: translateY(6px);
  transition: opacity .4s ease-out, transform .4s ease-out;
}
.htg-col-label.vis { opacity: 1; transform: translateY(0); }
.htg-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: .05rem; }
.htg-item {
  display: flex; align-items: flex-start; gap: .7rem;
  padding: .32rem 0; border-bottom: 1px solid rgba(0,0,0,.038);
  opacity: 0; transform: translateY(8px);
  transition: opacity .35s ease-out, transform .35s ease-out;
}
.htg-item:last-child { border-bottom: none; }
.htg-item.vis { opacity: 1; transform: translateY(0); }
.htg-num {
  flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
  background: #44E87A; color: #fff;
  font-size: .6rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  margin-top: .1rem;
  box-shadow: 0 1px 6px rgba(68,232,122,.25);
  transform: scale(0);
  transition: transform .4s cubic-bezier(.34,1.56,.64,1);
}
.htg-item.vis .htg-num { transform: scale(1); }
.htg-text { font-size: .88rem; font-weight: 440; line-height: 1.55; color: #1a1a1a; letter-spacing: .005em; }
.htg-text strong { font-weight: 620; color: #111; }

/* ─── COORDINATOR / CLIENT TRIGGER PULSE ──────────────────── */
.coord-trigger {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 10; pointer-events: none;
  opacity: 0; transition: opacity .25s ease;
}
.coord-trigger.show { opacity: 1; }
.coord-trigger.hide { opacity: 0; }

.coord-pulse {
  width: 48px; height: 48px; border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,.18); position: relative;
}
.coord-pulse::before {
  content: ''; position: absolute; inset: -8px; border-radius: 50%;
  border: 1px solid rgba(0,0,0,.08);
  animation: coordRing 1s ease-out infinite;
}
.coord-pulse::after {
  content: ''; position: absolute; inset: 14px; border-radius: 50%;
  background: rgba(0,0,0,.12);
  animation: coordDot .8s ease-in-out infinite alternate;
}
@keyframes coordRing {
  0%   { transform: scale(1);   opacity: .6; }
  100% { transform: scale(1.7); opacity: 0;  }
}
@keyframes coordDot {
  0%   { transform: scale(.8);  opacity: .4; }
  100% { transform: scale(1.1); opacity: .9; }
}

.client-pulse {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(0,0,0,.06); position: relative;
}
.client-pulse::before,
.client-pulse::after {
  content: ''; position: absolute; border-radius: 50%;
  border: 1px solid rgba(0,0,0,.07);
  animation: clientRing1 1.1s ease-out infinite;
}
.client-pulse::before { inset: -10px; }
.client-pulse::after  { inset: -20px; border-color: rgba(0,0,0,.04); animation-delay: .3s; }
@keyframes clientRing1 {
  0%   { transform: scale(.85); opacity: .7; }
  100% { transform: scale(1.6); opacity: 0;  }
}

/* ─── ADMIN STEPS (Coordinator / Client panels) ────────────── */
.admin-steps-wrap {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; justify-content: flex-start;
  padding: 2rem 3.5rem 1.5rem; box-sizing: border-box; overflow: hidden;
}
.admin-steps-header {
  font-size: .68rem; font-weight: 600;
  letter-spacing: .18em; text-transform: uppercase; color: #44E87A;
  margin-bottom: 1rem;
  opacity: 0;
  animation: stepFadeUp .4s ease-out .1s forwards;
}
@keyframes stepFadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0);   }
}
.admin-steps-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0; }
.admin-step-item {
  display: flex; align-items: flex-start; gap: 1rem;
  opacity: 0; transform: translateY(10px);
  transition: opacity .4s ease-out, transform .4s ease-out;
  padding: .42rem 0; border-bottom: 1px solid rgba(0,0,0,.045);
  position: relative;
}
.admin-step-item:last-child { border-bottom: none; }
.admin-step-item.visible    { opacity: 1; transform: translateY(0); }
.step-num {
  flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
  background: #44E87A; color: #fff;
  font-size: .7rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  margin-top: .05rem;
  box-shadow: 0 2px 8px rgba(68,232,122,.28);
  transform: scale(0);
  transition: transform .45s cubic-bezier(.34,1.56,.64,1) .05s;
}
.admin-step-item.visible .step-num { transform: scale(1); }
.admin-step-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px; background: #44E87A; border-radius: 2px;
  transform: scaleY(0); transform-origin: top center;
  transition: transform .35s cubic-bezier(.22,1,.36,1) .1s;
  opacity: 0;
}
.admin-step-item.visible::before { transform: scaleY(1); opacity: .35; }
.step-text { font-size: 1.05rem; font-weight: 450; line-height: 1.6; color: #1a1a1a; letter-spacing: .005em; }
.step-text strong { font-weight: 600; color: #111; }

/* ─── iPHONE FRAME ─────────────────────────────────────────── */
.iphone-frame {
  position: relative;
  width: auto; height: 88%; aspect-ratio: 9/16; max-height: 92%;
  border-radius: 44px;
  background: linear-gradient(160deg, #2a2a2a 0%, #0d0d0d 100%);
  box-shadow:
    0 0 0 1px #3a3a3a,
    0 0 0 2px #111,
    0 28px 72px rgba(0,0,0,.55),
    0 10px 28px rgba(0,0,0,.35);
  transition: all .2s ease;
}
.iphone-frame::before {
  content: ''; position: absolute; left: -4px; top: 14%;
  width: 4px; height: 7%;
  background: #2a2a2a; border-radius: 3px 0 0 3px;
  box-shadow: 0 11% 0 #2a2a2a, 0 19% 0 #2a2a2a;
}
.iphone-frame::after {
  content: ''; position: absolute; right: -4px; top: 18%;
  width: 4px; height: 15%;
  background: #2a2a2a; border-radius: 0 3px 3px 0;
}
.iphone-screen {
  position: absolute; inset: 7px; border-radius: 36px;
  overflow: hidden; background: #000;
  box-shadow: inset 0 0 0 .5px rgba(255,255,255,.05);
}
.iphone-notch {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  width: 58px; height: 14px; background: #0a0a0a; border-radius: 20px; z-index: 10;
}
.iphone-video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; pointer-events: none; border-radius: 36px;
  opacity: 1; transition: opacity .4s ease;
}
.iphone-video.fading { opacity: 0; }
.iphone-statusbar {
  position: absolute; top: 0; left: 0; right: 0; height: 36px;
  z-index: 8; pointer-events: none;
  display: flex; align-items: center; justify-content: flex-end;
  padding: 10px 18px 0;
}
.iphone-statusbar-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #44E87A; opacity: .85;
  animation: statusBlink 2.4s ease-in-out infinite;
}
@keyframes statusBlink {
  0%, 100% { opacity: .85; }
  50%       { opacity: .3;  }
}

/* ─── TYPING CURSOR ────────────────────────────────────────── */
.ty-cursor {
  display: inline-block; width: 1.5px; height: .85em;
  background: currentColor; margin-left: 1px;
  vertical-align: middle; opacity: .7;
  animation: tyCursorBlink .9s step-end infinite;
}
@keyframes tyCursorBlink {
  0%, 100% { opacity: .7; }
  50%       { opacity: 0;  }
}
.ty-cursor.done { display: none; }

/* ─── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 1100px) {
  .win-body-right { width: 380px; padding: 8px 20px; }
  .iphone-frame   { height: 86%; }
}
@media (max-width: 960px) {
  .win-body-right { width: 320px; padding: 8px 16px; }
  .iphone-frame   { height: 84%; }
}
@media (max-width: 768px) {
  #screen3 { padding: 3.2rem .6rem .6rem; }
  .app-win  { height: calc(100dvh - 4rem); max-height: none; border-radius: 12px; }
  .win-bar  { height: 36px; padding: 0 10px; gap: 6px; }
  .wb       { width: 10px; height: 10px; }
  .win-tabs { height: 33px; padding: 0 8px; gap: 3px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .win-tab  { font-size: .67rem; padding: 0 9px; height: 23px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
  .how-to-wrap        { padding: 1rem 1.1rem .9rem; justify-content: flex-start; overflow-y: auto; height: 100%; }
  .how-to-eyebrow     { font-size: .58rem; margin-bottom: .35rem; }
  .how-to-heading     { font-size: clamp(1.05rem,4.5vw,1.4rem); margin-bottom: .8rem; }
  .htg-col-label      { font-size: .56rem; margin-bottom: .35rem; }
  .htg-item           { padding: .22rem 0; gap: .5rem; }
  .htg-num            { width: 17px; height: 17px; font-size: .52rem; flex-shrink: 0; }
  .htg-text           { font-size: .8rem; line-height: 1.45; }
  .admin-steps-wrap   { padding: 1rem 1.2rem .9rem; overflow-y: auto; height: 100%; }
  .admin-steps-header { font-size: .58rem; margin-bottom: .6rem; }
  .admin-step-item    { gap: .65rem; padding: .28rem 0; }
  .step-num           { width: 20px; height: 20px; font-size: .6rem; flex-shrink: 0; }
  .step-text          { font-size: .84rem; line-height: 1.5; }
  .win-body-inner     { flex-direction: column; }
  .win-body-left      { flex: 1; height: auto; min-height: 0; }
  .win-body-right {
    width: 100%; flex-shrink: 0;
    padding: 24px 0 28px; justify-content: center;
    border-top: 1px solid rgba(0,0,0,.07);
    background: rgba(250,249,246,.9);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .iphone-frame   { width: auto; height: 70vw; max-height: 380px; aspect-ratio: 9/16; }
  .iphone-screen  { inset: 5px; border-radius: 28px; }
  .iphone-video   { border-radius: 28px; }
  .iphone-notch   { width: 42px; height: 10px; top: 8px; }
}
@media (max-width: 480px) {
  .iphone-frame  { height: 68vw; max-height: 320px; }
  .iphone-screen { inset: 4px; border-radius: 24px; }
  .iphone-video  { border-radius: 24px; }
  .iphone-notch  { width: 32px; height: 8px; top: 6px; }
  .htg-text      { font-size: .78rem; line-height: 1.42; }
  .step-text     { font-size: .84rem; line-height: 1.48; }
}
@media (max-width: 360px) {
  .iphone-frame  { height: 65vw; max-height: 280px; }
  .iphone-screen { inset: 3px; border-radius: 20px; }
  .iphone-video  { border-radius: 20px; }
}
@media (hover: none) and (pointer: coarse) {
  .win-tab:hover:not(.on) { background: transparent !important; transform: none !important; }
  .win-tab:active         { background: rgba(0,0,0,.07) !important; }
}
@media (prefers-reduced-motion: reduce) {
  .iphone-frame, .ty-cursor { animation: none !important; }
}
</style>
</head>
<body>

<!-- ═══ SCREEN 3 ════════════════════════════════════════════ -->
<div id="screen3">

  <!-- Vanta animated background -->
  <div id="vanta-bg"></div>

  <!-- App chrome -->
  <div class="app-win" id="appWin">

    <!-- Title bar -->
    <div class="win-bar">
      <div class="wb r"></div>
      <div class="wb y"></div>
      <div class="wb g"></div>
    </div>

    <!-- Tab bar -->
    <div class="win-tabs">
      <div class="win-tab on"  data-tab="admin">Admin</div>
      <div class="win-tab"     data-tab="coordinator">Coordinator</div>
      <div class="win-tab"     data-tab="client">Client</div>
    </div>

    <!-- Body -->
    <div class="win-body">
      <div class="win-body-inner">

        <!-- ── Left: tab panels ── -->
        <div class="win-body-left">

          <!-- Admin (How-to) panel -->
          <div class="tab-panel active" id="panel-admin">
            <div class="how-to-wrap">
              <div class="how-to-eyebrow" id="howToEyebrow">Getting Started</div>
              <h2  class="how-to-heading"  id="howToHeading">How to use Queue Eliminator</h2>
              <div class="how-to-grid">
                <div class="htg-col">
                  <div class="htg-col-label" id="htgLabel">Admin</div>
                  <ol  class="htg-list"       id="adminStepsList"></ol>
                </div>
              </div>
            </div>
          </div>

          <!-- Coordinator panel -->
          <div class="tab-panel" id="panel-coordinator">
            <div class="coord-trigger" id="coordTrigger">
              <div class="coord-pulse"></div>
            </div>
            <div class="admin-steps-wrap" id="coordStepsWrap" style="opacity:0;transition:opacity .35s ease">
              <div class="admin-steps-header">Coordinator Workflow</div>
              <ol  class="admin-steps-list" id="coordStepsList"></ol>
            </div>
          </div>

          <!-- Client panel -->
          <div class="tab-panel" id="panel-client">
            <div class="coord-trigger" id="clientTrigger">
              <div class="client-pulse"></div>
            </div>
            <div class="admin-steps-wrap" id="clientStepsWrap" style="opacity:0;transition:opacity .35s ease">
              <div class="admin-steps-header">Client Journey</div>
              <ol  class="admin-steps-list" id="clientStepsList"></ol>
            </div>
          </div>

        </div><!-- /win-body-left -->

        <!-- ── Right: iPhone preview ── -->
        <div class="win-body-right">
          <div class="iphone-frame" id="iphoneFrame">
            <div class="iphone-screen">
              <div class="iphone-notch"></div>
              <video
                id="iphoneVideo"
                class="iphone-video"
                src="adime and coordintor.mp4"
                autoplay muted loop playsinline
                style="pointer-events:none"
              ></video>
              <div class="iphone-statusbar">
                <div class="iphone-statusbar-dot"></div>
              </div>
            </div>
          </div>
        </div><!-- /win-body-right -->

      </div><!-- /win-body-inner -->
    </div><!-- /win-body -->

  </div><!-- /app-win -->
</div><!-- /screen3 -->


<script>
(function () {
  'use strict';

  /* ─── HELPERS ────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);

  /* Typing engine (minimal, scoped to Screen 3 headings) */
  const _tyDone = new WeakSet();
  function typeEl(el, fullText, opts) {
    if (!el || _tyDone.has(el)) return;
    _tyDone.add(el);
    const o = { delay: 0, speed: 52, jitter: 28, onDone: null, ...opts };
    const origHTML = el.innerHTML;
    el.textContent = '';
    const cur = Object.assign(document.createElement('span'), { className: 'ty-cursor' });
    cur.setAttribute('aria-hidden', 'true');
    const tn = document.createTextNode('');
    el.appendChild(tn);
    el.appendChild(cur);
    let i = 0;
    function step() {
      if (i < fullText.length) {
        const ch = fullText[i++];
        tn.nodeValue += ch;
        let d = o.speed + (Math.random() * o.jitter - o.jitter / 2);
        if ('.!?'.includes(ch)) d += 180;
        else if (ch === ',')    d += 80;
        else if (ch === ' ')    d += 10;
        setTimeout(step, Math.max(8, d));
      } else {
        cur.classList.add('done');
        setTimeout(() => { el.innerHTML = origHTML; }, 180);
        o.onDone && o.onDone();
      }
    }
    setTimeout(step, o.delay);
  }

  function plainText(html) {
    const t = document.createElement('div');
    t.innerHTML = html;
    return t.textContent || t.innerText || '';
  }

  /* ─── STEP LIST BUILDER ──────────────────────────────────── */
  const STEPS = {
    admin: [
      'Login to your <strong>dashboard</strong>',
      'Create your <strong>queue form</strong>',
      'Generate your <strong>QR code</strong>',
      'Place QR at <strong>entry point</strong>',
      'Monitor <strong>live queue</strong>',
      'Manage customers <strong>in real-time</strong>',
    ],
    coordinator: [
      'Login to your <strong>coordinator panel</strong>',
      'View the <strong>live queue</strong> instantly',
      'Check who is <strong>next in line</strong>',
      'Call the <strong>next customer</strong>',
      'Skip or <strong>manage entries</strong> if needed',
      'Mark customers as <strong>served</strong>',
    ],
    client: [
      'Scan the <strong>QR code</strong> at the location',
      'Fill in your <strong>basic details</strong>',
      'Get your <strong>queue token</strong> instantly',
      'Check your <strong>live position</strong> in queue',
      'Wait comfortably <strong>without standing</strong>',
      'Arrive when your <strong>turn is near</strong>',
    ],
  };

  function fillStepList(listId, steps, isHowTo) {
    const list = $(listId);
    if (!list || list.children.length) return;
    steps.forEach((text, i) => {
      const li  = document.createElement('li');
      li.className = isHowTo ? 'htg-item' : 'admin-step-item';
      const num = document.createElement('span');
      num.className = isHowTo ? 'htg-num' : 'step-num';
      num.textContent = i + 1;
      const txt = document.createElement('span');
      txt.className = isHowTo ? 'htg-text' : 'step-text';
      txt.innerHTML = text;
      li.appendChild(num);
      li.appendChild(txt);
      list.appendChild(li);
    });
  }

  /* ─── REVEAL HELPERS ─────────────────────────────────────── */
  function revealItems(panelId, delay) {
    document.querySelectorAll(`#${panelId} .admin-step-item`).forEach((el, i) => {
      el.classList.remove('visible');
      setTimeout(() => el.classList.add('visible'), delay + i * 240);
    });
  }

  /* ─── TABS ───────────────────────────────────────────────── */
  const VIDEO_MAP = {
    admin:       'adime and coordintor.mp4',
    coordinator: 'adime and coordintor.mp4',
    client:      'client.mp4',
  };

  function activateTab(target) {
    document.querySelectorAll('.win-tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

    document.querySelector(`[data-tab="${target}"]`).classList.add('on');
    const panel = $(`panel-${target}`);
    if (!panel) return;
    panel.classList.add('active');

    if (target === 'coordinator' || target === 'client') {
      const prefix  = target === 'coordinator' ? 'coord' : 'client';
      const trigger = $(`${prefix}Trigger`);
      const sw      = $(`${prefix}StepsWrap`);
      sw.style.opacity = '0';
      trigger.classList.remove('hide');
      trigger.classList.add('show');
      setTimeout(() => {
        trigger.classList.remove('show');
        trigger.classList.add('hide');
        setTimeout(() => {
          sw.style.opacity = '1';
          revealItems(`panel-${target}`, 60);
        }, 260);
      }, 820);
    } else {
      revealItems(`panel-${target}`, 80);
    }

    // Swap iPhone video
    swapVideo(VIDEO_MAP[target] || VIDEO_MAP.admin);
  }

  function initTabs() {
    document.querySelectorAll('.win-tab').forEach(tab => {
      tab.addEventListener('click', () => activateTab(tab.dataset.tab));
    });
  }

  /* ─── iPHONE VIDEO ───────────────────────────────────────── */
  function swapVideo(newSrc) {
    const video = $('iphoneVideo');
    if (!video) return;
    const current = decodeURIComponent(video.getAttribute('src') || '');
    if (current === newSrc || current.endsWith(newSrc)) {
      video.currentTime = 0;
      video.play().catch(() => {});
      return;
    }
    video.classList.add('fading');
    setTimeout(() => {
      video.src = newSrc;
      video.load();
      video.play().catch(() => {});
      setTimeout(() => video.classList.remove('fading'), 60);
    }, 300);
  }

  function initIphonePreview() {
    const video = $('iphoneVideo');
    if (!video) return;
    video.muted = true;
    video.play().catch(() => {});

    const frame = $('iphoneFrame');
    if (frame) {
      frame.style.cssText = 'opacity:0;transition:opacity .7s cubic-bezier(.22,1,.36,1) .45s';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        frame.style.opacity = '1';
        setTimeout(() => { frame.style.transition = ''; }, 1200);
      }));
    }
  }

  /* ─── INIT SEQUENCE ──────────────────────────────────────── */
  function initScreen3() {
    // Build all step lists
    fillStepList('adminStepsList', STEPS.admin, true);
    fillStepList('coordStepsList', STEPS.coordinator, false);
    fillStepList('clientStepsList', STEPS.client, false);

    initTabs();
    initIphonePreview();

    $('appWin').classList.add('rdy');

    // Stagger eyebrow / heading / label / item reveals
    setTimeout(() => $('howToEyebrow')?.classList.add('vis'), 120);
    setTimeout(() => $('howToHeading')?.classList.add('vis'), 260);
    document.querySelectorAll('.htg-col-label').forEach((el, i) =>
      setTimeout(() => el.classList.add('vis'), 420 + i * 80));
    document.querySelectorAll('.htg-item').forEach((el, i) =>
      setTimeout(() => el.classList.add('vis'), 560 + i * 70));

    // Type the heading
    setTimeout(() => {
      const el = $('howToHeading');
      el && typeEl(el, plainText(el.innerHTML || 'How to use Queue Eliminator'),
        { delay: 120, speed: 55, jitter: 22 });
    }, 600);
  }

  /* ─── VANTA (desktop only) ───────────────────────────────── */
  (function initVanta() {
    if (window.innerWidth <= 480) return;
    function tryInit() {
      if (typeof VANTA === 'undefined' || typeof THREE === 'undefined') {
        return setTimeout(tryInit, 80);
      }
      VANTA.CELLS({
        el: '#vanta-bg', THREE,
        mouseControls: false, touchControls: false, gyroControls: false,
        color1: 0xffffff, color2: 0xffffff,
        size: 0.20, speed: 0.30,
      });
    }
    tryInit();
  })();

  /* ─── BOOT ───────────────────────────────────────────────── */
  initScreen3();

})();
</script>
</body>
</html>
